<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      width: 600px;
      height: 400px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border: 10px solid #00274c;
      position: relative;
    }
    .certificate {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .header {
      color: #00274c;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .title {
      color: #333;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      line-height: 1.2;
    }
    .org {
      color: #00274c;
      font-size: 16px;
      margin-bottom: 20px;
      font-style: italic;
    }
    .coursera {
      color: #0056d3;
      font-size: 14px;
      font-weight: bold;
    }
    .decoration {
      position: absolute;
      top: 10px;
      right: 10px;
      color: #00274c;
      font-size: 40px;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="decoration">🏆</div>
  <div class="certificate">
    <div class="header">Certificate of Completion</div>
    <div class="title">Data Science Ethics</div>
    <div class="org">University of Michigan</div>
    <div class="coursera">Coursera</div>
  </div>
</body>
</html>

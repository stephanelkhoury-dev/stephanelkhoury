<svg width="400" height="280" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Background -->
    <rect width="400" height="280" fill="url(#bgGradient)" stroke="#232d4b" stroke-width="8"/>
    
    <!-- Certificate content -->
    <rect x="20" y="20" width="360" height="240" fill="white" rx="10" opacity="0.95"/>
    
    <!-- Header -->
    <text x="200" y="50" text-anchor="middle" fill="#232d4b" font-family="serif" font-size="14" font-weight="bold">CERTIFICATE OF COMPLETION</text>
    
    <!-- Title -->
    <text x="200" y="90" text-anchor="middle" fill="#333" font-family="serif" font-size="16" font-weight="bold">
      <tspan x="200" dy="0">Professionalism in an Era of C...</tspan>
    </text>
    
    <!-- Organization -->
    <text x="200" y="130" text-anchor="middle" fill="#232d4b" font-family="serif" font-size="14" font-style="italic">University of Virginia</text>
    
    <!-- Coursera -->
    <text x="200" y="160" text-anchor="middle" fill="#0056d3" font-family="serif" font-size="12" font-weight="bold">Coursera</text>
    
    <!-- Trophy icon -->
    <text x="350" y="40" text-anchor="middle" fill="#232d4b" font-size="24" opacity="0.3">🏆</text>
    
    <!-- Decorative border -->
    <rect x="30" y="30" width="340" height="220" fill="none" stroke="#232d4b" stroke-width="1" opacity="0.3"/>
  </svg>